<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="DataNest - Open Dataset Directory">
  <title>DataNest — Open Dataset Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
        <span>DataNest</span>
      </a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Browse</a>
        <a href="request.html" class="nav-link">Request</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="browse-hero">
      <h1>Browse <span class="gradient-text">Datasets</span></h1>
      <p>Find the perfect dataset for your research or project.</p>
    </section>

    <section class="search-section">
      <div class="search-container">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Search datasets...">
        </div>
        <div class="filter-row">
          <select id="topicFilter"><option value="">All Topics</option></select>
          <select id="formatFilter">
            <option value="">All Formats</option>
            <option value="CSV">CSV</option>
            <option value="JSON">JSON</option>
            <option value="API">API / Code</option>
          </select>
          <select id="sortBy">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="az">A-Z</option>
            <option value="za">Z-A</option>
          </select>
        </div>
        <div class="topic-chips" id="topicChips"></div>
      </div>
    </section>

    <section class="results-section">
      <div class="results-header">
        <span class="results-count">Showing <strong id="countDisplay">0</strong> datasets</span>
      </div>
      <div class="cards-grid" id="cards"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
        <h3>No datasets found</h3>
        <p>Try adjusting your search or filters.</p>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <div class="logo"><div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div><span>DataNest</span></div>
        <p>Curated datasets for researchers.</p>
      </div>
      <div class="footer-links"><a href="index.html">Browse</a><a href="request.html">Request</a><a href="about.html">About</a></div>
    </div>
    <div class="footer-bottom"><p>Free & Open Source</p></div>
  </footer>
  <script src="js/count.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
